name: Sports Connect sync

# Hourly POST to /api/sync/sports-connect. Lives here instead of vercel.json
# because Vercel Hobby only allows daily crons. GitHub Actions is free and
# triggers to the minute.

on:
  schedule:
    - cron: "15 * * * *"   # every hour at :15 UTC
  workflow_dispatch:       # manual trigger from the Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: POST /api/sync/sports-connect
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl -fsS -X POST \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            https://fields.poweryourleague.com/api/sync/sports-connect
