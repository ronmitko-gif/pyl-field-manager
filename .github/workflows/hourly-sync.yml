name: Hourly sync (rec + travel)

on:
  # Hourly schedule paused 2026-07-22 — was emailing on every failed run while
  # the deployment was down. Re-enable by uncommenting the schedule below.
  # schedule:
  #   - cron: "15 * * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Sync Sports Connect (rec)
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl -fsS -X POST \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            https://fields.poweryourleague.com/api/sync/sports-connect
      - name: Sync travel recurring slots
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl -fsS -X POST \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            https://fields.poweryourleague.com/api/sync/travel-slots
      - name: Generate concession events
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl -fsS -X POST \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            https://fields.poweryourleague.com/api/cron/generate-concessions
