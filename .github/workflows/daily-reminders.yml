name: Daily concession reminders

on:
  # Daily schedule paused 2026-07-22 — was emailing on every failed run while
  # the deployment was down. Re-enable by uncommenting the schedule below.
  # schedule:
  #   - cron: "0 12 * * *"
  workflow_dispatch:

jobs:
  remind:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Send day-of reminders
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl -fsS -X POST \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            https://fields.poweryourleague.com/api/cron/send-reminders
